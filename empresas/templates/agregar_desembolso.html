{% extends 'base.html' %}
{% block title %}Agregar Desembolso{% endblock %}

{% block content %}
<h2 class="mb-4 text-primary-emphasis">
    ➕ Nuevo desembolso – Fideicomiso {{ fideicomiso.id }}
</h2>

<form method="post" novalidate>
    {% csrf_token %}

    {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-bold" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for e in field.errors %}<div class="text-danger small">{{ e }}</div>{% endfor %}
        </div>
    {% endfor %}

    <button class="btn text-white" style="background-color:#f05523;">💾 Guardar</button>
    <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
